services:
  - type: web
    name: ai-safety-triage-console
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.address 0.0.0.0 --server.port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: OPENAI_API_KEY
        sync: false